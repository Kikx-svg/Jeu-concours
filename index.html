<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacBook Neo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0ea5e9, #1e3a8a);
  color: white;
}

/* CARD */
.container {
  padding: 20px;
  text-align: center;
}

.card {
  max-width: 420px;
  margin: auto;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 25px;
}

/* IMAGE */
img.main {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

/* BOUTON */
.btn {
  background: linear-gradient(135deg, #06b6d4, #2563eb);
  border: none;
  padding: 14px;
  border-radius: 25px;
  color: white;
  font-weight: bold;
  width: 100%;
  margin-top: 20px;
}

/* CIVILITE PROPRE */
.civilite {
  display: flex;
  gap: 10px;
  margin: 20px 0;
}

.civilite button {
  flex: 1;
  padding: 14px;
  border-radius: 15px;
  border: 2px solid rgba(255,255,255,0.4);
  background: transparent;
  color: white;
  font-size: 16px;
}

.civilite button.active {
  background: linear-gradient(135deg, #06b6d4, #2563eb);
  border: none;
}

/* HIDDEN */
.hidden {
  display: none;
}
</style>

</head>

<body>

<div class="container">

<!-- PAGE 1 -->
<div id="step1" class="card">
  <img class="main" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
  <h1>Gagnez le MacBook Neo</h1>
  <button class="btn" onclick="showForm()">Participer</button>
</div>

<!-- PAGE 2 -->
<div id="step2" class="card hidden">
  <img class="main" src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853">
  <h2>Inscription</h2>

  <form id="contestForm">

    <!-- NOUVELLE CIVILITE -->
    <div class="civilite">
      <button type="button" onclick="setCivilite(this, 'Mr')">Mr</button>
      <button type="button" onclick="setCivilite(this, 'Mme')">Mme</button>
    </div>

    <input type="text" id="nom" placeholder="Nom">
    <input type="text" id="prenom" placeholder="Prénom">
    <input type="text" id="email" placeholder="Email">
    <input type="text" id="telephone" placeholder="Téléphone">
    <input type="text" id="adresse" placeholder="Adresse postale complète">

    <button class="btn">Valider</button>
  </form>
</div>

<!-- PAGE 3 -->
<div id="step3" class="card hidden">
  <img class="main" src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
  <h2>🎉 Bravo !</h2>
  <p>Votre participation a bien été enregistrée.</p>
</div>

</div>

<script>
let civilite = "";

function setCivilite(el, value) {
  civilite = value;

  document.querySelectorAll(".civilite button").forEach(btn => {
    btn.classList.remove("active");
  });

  el.classList.add("active");
}

function showForm() {
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

document.getElementById("contestForm").addEventListener("submit", function(e) {
  e.preventDefault();

  if (!civilite) {
    alert("Sélectionnez Mr ou Mme");
    return;
  }

  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");
});
</script>

</body>
</html>
